name: Build Android APK (Skip TS Check)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 安装 Rust 编译环境
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      # 2. 设置 Java 环境 (JDK 17)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. 设置 pnpm 和 Node.js
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # 4. 安装 Linux 系统依赖 (适配 Ubuntu 24.04 的 4.1 版本)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # 5. 设置 Android SDK/NDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 6. 安装前端项目依赖
      - name: Install dependencies
        run: pnpm install

      # 7. 执行 Android 构建 (暴力跳过 TS 检查)
      # 使用 -- 传递参数给内部的 build 命令，强制重写 beforeBuildCommand
      - name: Build Android APK
        run: |
          pnpm tauri android build -- --before-build-command "pnpm vite build"
        env:
          NDK_HOME: ${{ steps.setup-android.outputs.ndk-path }}

      # 8. 上传生成的 APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HuLa-Android-Release
          # 默认打包后的路径通常在此目录下
          path: src-tauri/gen/android/**/*.apk
          retention-days: 7
